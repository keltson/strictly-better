name: Sync Card Data

on:
  # Run at midnight UTC on days 28–31 of every month.
  # The "last day of month" check below filters this to run only on the actual last day.
  schedule:
    - cron: '0 0 28-31 * *'

  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check if today is the last day of the month
        # Skip on days 28–30 when they are not the last day (e.g. skip Feb 28 in leap years).
        # On workflow_dispatch we always run regardless of date.
        id: date_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Triggered manually — skipping date check."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            TOMORROW=$(date -d tomorrow +%d)
            if [ "$TOMORROW" = "01" ]; then
              echo "Today is the last day of the month — proceeding."
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "Today is NOT the last day of the month — skipping."
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout repository
        if: steps.date_check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.date_check.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.date_check.outputs.run == 'true'
        run: npm ci

      - name: Run sync script
        if: steps.date_check.outputs.run == 'true'
        run: node scripts/sync-card-data.js

      - name: Commit and push changes
        if: steps.date_check.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add card-pairs.json card-cache.json

          if git diff --cached --quiet; then
            echo "No changes to commit — data is already up to date."
          else
            git commit -m "chore: sync card data [$(date -u +%Y-%m-%d)]"
            git push
            echo "Changes committed and pushed."
          fi
